name: CI

on:
  push:
  pull_request:

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats jq
      - name: Syntax
        run: make syntax
      - name: Shellcheck
        run: make lint
      - name: Tests
        run: make test
